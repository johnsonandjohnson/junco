name: Hotfix Tests 🔥

on:
  workflow_call:
    secrets:
      REPO_GITHUB_TOKEN:
        description: |
          Github token with read access to repositories
        required: false
  push:
    branches:
      - 'feature/hotfix-*'
  workflow_dispatch:

jobs:
  test-hotfix:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: '4.5.0'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout Hotfix Branch
        uses: actions/checkout@v4
        with:
          path: hotfix_repo

      - name: Checkout Junco v0.1.1
        uses: actions/checkout@v4
        with:
          ref: v0.1.1
          path: junco_source

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: junco_source
          extra-packages: |
            any::devtools
            any::testthat

      - name: Install Local Junco v0.1.1
        shell: Rscript {0}
        run: |
          devtools::install("junco_source", upgrade = FALSE, quick = TRUE)

      - name: Execute tests with hotfixes
        shell: Rscript {0}
        run: |
          project_root <- file.path(getwd(), "junco_source")
          hotfix_file <- file.path(getwd(), "hotfix_repo", "dev", "junco_hotfix.R")
          
          setwd(project_root)
          
          devtools::install(project_root)
          library(junco)
          
          #  Inject the Hotfix 
          if (file.exists(hotfix_file)) {
            message(">>> Injecting Hotfix: ", hotfix_file)
            source(hotfix_file, local = FALSE)
          } else {
            stop("Hotfix file not found at ", hotfix_file)
          }

          # Run tests in the current environment
          library(testthat)
          options(rgl.useNULL = TRUE)
          options(testthat.progress.max_reports = 10)
          testthat::set_max_fails(Inf)
          Sys.setenv(NOT_CRAN = "false") # Ensure NOT_CRAN is false to mimic CRAN checks
          
          # Run tests using the Global Environment
          message(">>> Running tests in GlobalEnv (Snapshots preserved)...")
          reporter <- testthat::ListReporter$new()

          try({
            testthat::test_dir(
              path = "tests/testthat",
              reporter = reporter,
              env = globalenv(),    
              load_helpers = FALSE, 
              stop_on_failure = FALSE
            )
          }, silent = FALSE)
          
          res_list <- reporter$get_results()
          df_results <- as.data.frame(res_list)

          if (testthat:::all_passed(res_list)) {
            message("\n✅ SUCCESS: Hotfix passed all tests on v0.1.1.")
          } else {
            message("\n❌ FAILURE: Hotfix validation failed on v0.1.1.")
            
            # Filter for files that had issues
            failed_files <- df_results[df_results$failed > 0 | df_results$error, ]
            
            cat("\nFailed Test Files:\n")
            print(failed_files[, c("file", "test", "failed", "error")])
            
            # Final stop to kill the process (Local or CI)
            stop(sprintf("Validation failed with %d errors/failures.", 
                        sum(df_results$failed) + sum(df_results$error)), call. = FALSE)
          }