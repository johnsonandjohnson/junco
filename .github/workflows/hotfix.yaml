name: Hotfix Tests 🔥

on:
  workflow_call:
    secrets:
      REPO_GITHUB_TOKEN:
        description: |
          Github token with read access to repositories
        required: false
  push:
    branches:
      - 'feature/hotfix-*'
  workflow_dispatch:

jobs:
  test-hotfix:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: '4.5.0'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout Hotfix Branch
        uses: actions/checkout@v4
        with:
          path: hotfix_repo

      - name: Checkout Junco v0.1.1
        uses: actions/checkout@v4
        with:
          ref: refs/heads/v0.1.1
          path: junco_source

      - name: Inject Hotfix into Source Code
        shell: bash
        run: |
          HOTFIX="hotfix_repo/dev/junco_hotfix.R"
          TARGET="junco_source/R/zzz_hotfix.R" 
          
          if [ -f "$HOTFIX" ]; then
            echo -e "\n\n# --- HOTFIX INJECTION --- \n" >> "$TARGET"
            cat "$HOTFIX" >> "$TARGET"
            echo ">>> Splicing complete."
          else
            echo "Error: Hotfix file not found!"
            exit 1
          fi

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: junco_source
          extra-packages: |
            any::devtools
            any::testthat

      - name: Execute tests natively
        shell: Rscript {0}
        run: |
          setwd(file.path(getwd(), "junco_source"))
          
          
          # Setup environment
          options(rgl.useNULL = TRUE)
          Sys.setenv(NOT_CRAN = "true") 
          
          message(">>> Running  devtools::test() with hotfix...")
          
          devtools::test()