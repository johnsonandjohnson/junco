---
name: release 🕰️

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches: [main, CRAN]
  workflow_call:
    secrets:
      REPO_GITHUB_TOKEN:
        description: |
          Github token with read access to repositories
        required: false
  workflow_dispatch:
    inputs:
      chosen-workflow:
        description: |
          Select which workflow you'd like to run
        required: true
        type: choice
        default: rhub
        options:
          - rhub
          - revdepcheck

jobs:
  revdepcheck:
    name: revdepcheck 🧑‍🔬
    uses: johnsonandjohnson/actions/.github/workflows/revdepcheck.yaml@dev
  rhub:
    name: R-hub 🌐
    uses: johnsonandjohnson/actions/.github/workflows/rhub.yaml@dev
